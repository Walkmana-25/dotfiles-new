# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[¯éÂ](fg:#7aa2f7)\
$os\
[¯é░ ](fg:#7aa2f7 bg:#666666)\
$directory\
$git_branch\
$git_status\
$git_metrics\
[¯é░](fg:#666666)\
$fill\
[¯é▓](fg:#666666)\
$cmd_duration\
[ ¯é▓](fg:#7aa2f7 bg:#666666)\
$time\
[¯é┤](fg:#7aa2f7)
$character\
"""

right_format = """
$all\
"""

# Inserts a blank line between shell prompts
add_newline = true

[git_status]
style = 'fg:#e0af68 bg:#666666'
conflicted = '='
ahead = 'Ôçí${count}'
behind = 'Ôçú${count}'
diverged = 'Ôçò'
up_to_date = 'Ô£ô'
untracked = '?'
stashed = '$'
modified = '!${count}'
renamed = '┬╗'
deleted = 'Ô£İ'
format = '([\[$all_status$ahead_behind\]]($style))'

[git_metrics]
added_style = 'fg:#9ece6a bg:#666666'
deleted_style = 'fg:#9ece6a bg:#666666'
format = '[+$added/-$deleted]($deleted_style)'
disabled = false

[time]
disabled = false
style = 'fg:#666666 bg:#7aa2f7'
format = '[´Çù $time]($style)' # nf-pl-right_soft_divider, nf-fa-clock_o
time_format = '%T'
utc_time_offset = '+9'

[cmd_duration]
min_time = 1
style = 'fg:#e0af68 bg:#666666'
format = "[ ¯Äé $duration]($style)" # nf-pl-right_soft_divider, nf-mdi-clock


[fill]
symbol = 'ÔöÇ'
style = 'blue'

# Replace the 'ÔØ»' symbol in the prompt with 'ÔŞ£'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[Insert ÔØ»](green)' # The 'success_symbol' segment is being set to 'ÔŞ£' with the color 'bold green'
error_symbol = '[Insert ÔØ»](red)' # The 'success_symbol' segment is being set to 'ÔŞ£' with the color 'bold green'
vimcmd_symbol = '[Normal ÔØ»](blue)'
vimcmd_visual_symbol = '[Visual ÔØ»](yellow)'
vimcmd_replace_symbol = '[Replace ÔØ»](purple)'
vimcmd_replace_one_symbol = '[ReplaceOne ÔØ»](purple)'

[os]
disabled = false
format = "[$symbol]($style)"
style = 'fg:#666666 bg:#7aa2f7'

[directory]
truncation_length = 6
truncation_symbol = '´ü╝ ' # nf-fa-folder_open
truncate_to_repo = true
home_symbol = '´Çò ~' # nf-fa-home
style = 'fg:#7aa2f7 bg:#666666'
read_only = ' ¾░î¥ ' # nf-md-lock
read_only_style = 'fg:#f7768e bg:#666666'
format = '[$path]($style)[$read_only]($read_only_style)'


