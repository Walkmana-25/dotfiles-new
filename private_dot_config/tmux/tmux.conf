# ============================================================
# Shell Configuration
# ============================================================
#set-option -g default-shell "fish"
set -g default-command "fish"

# ============================================================
# Tmux Configuration
# ============================================================

set-option -g renumber-windows on   # ウィンドウを閉じた時に番号を詰める
set -g set-clipboard on   # Enable bracketed paste mode - paste without executing newlines automatically


# ============================================================
# UI / Display Settings
# ============================================================
set -g mouse on
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
set -g pane-border-status top
set -g set-titles on
set -g set-titles-string "#T"

# ============================================================
# Tokyo Night Color Theme
# ============================================================
# Base colors
set -g mode-style "fg=#7dcfff,bg=#16161e"
set -g message-style "fg=#7dcfff,bg=#16161e"
set -g message-command-style "fg=#c0caf5,bg=#1a1b26"

# Status bar
set -g status-style "fg=#c0caf5,bg=#1a1b26"
set -g status-left "#{?client_prefix,#[reverse] PREFIX Type ? for Help #[noreverse],}"
set -g status-left-length 30
set -g status-right "#[fg=#9ece6a,bold][+]#[default] #[fg=#565f89]%Y-%m-%d #[fg=#7dcfff]%H:%M #[fg=#9ece6a]#S "
set -g status-right-length 50
set -g status-interval 1

# Window status
set -g window-status-format "#[fg=#565f89]#I:#W "
set -g window-status-current-format "#[fg=#7dcfff,bold]#I:#W* "
set -g window-status-activity-style "fg=#ff9e64"
set -g window-status-bell-style "fg=#f7768e"

# Pane borders
set -g pane-border-style "fg=#565f89"     # 非アクティブ: Tokyo Nightの灰色（より明るく見やすい）
set -g pane-active-border-style "fg=#7dcfff,bold"  # アクティブ: シアン色＋太字（より目立つ）
set -g pane-border-lines "single"

# Copy mode highlights
setw -g mode-style "fg=#7dcfff,bg=#16161e,bold"


# ============================================================
# Key Bindings
# ============================================================
# Window split bindings
bind | split-window -h
bind - split-window -v

# Vim-style pane navigation (hjkl)
bind h select-pane -L  # 左
bind j select-pane -D  # 下
bind k select-pane -U  # 上
bind l select-pane -R  # 右

# Paste with Ctrl+v using bracketed paste mode (without prefix key)
bind-key -T root C-v run-shell 'LC_ALL=ja_JP.UTF-8 pbpaste | tmux load-buffer - && tmux paste-buffer -p'

#  Prefix + vim のキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D
bind -r K resize-pane -U
bind -r L resize-pane -R 5

#  vimのコピーを適用
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection

bind -r C-h select-window -t :-     # Prefix + Ctrl-h でウィンドウ切り替え
bind -r C-l select-window -t :+     # Prefix + Ctrl-l でウィンドウ切り替え

# 設定ファイルをリロード
bind-key -T prefix r source-file ~/.config/tmux/tmux.conf \; display-message 'Reloard was successful.'

# キーバインド一覧をポップアップ表示
bind-key ? display-popup -E -w 80% -h 80% 'bat ~/.config/tmux/keybindings.txt --paging=always --style=numbers'

# ============================================================
# Mouse Bindings for Window Management
# ============================================================
bind-key -T root MouseDown1StatusRight run-shell 'tmux new-window -c "#{pane_current_path}"'

# ウィンドウを右クリックでメニューを表示（カーソル位置に表示）
bind-key -T root MouseDown3Status display-menu -x P -y P -T "Window Menu" \
    "Join horizontally" h "run-shell 'tmux join-pane -h -s #{window_id}'" \
    "Join vertically" v "run-shell 'tmux join-pane -v -s #{window_id}'" \
    "-" "" "" \
    "Break panes to windows" b "run-shell 'for i in $(tmux list-panes -t #{window_id} -F \"#{pane_index}\" | tail -n +2); do tmux break-pane -s #{window_id}.$i -d; done'" \
    "-" "" "" \
    "Rename window" r "command-prompt -p \"Rename window:\" \"rename-window %%\"" \
    "Close window" c "kill-window" \
    "Cancel" q ""

# ダブルクリックでウィンドウを閉じる（確認あり）
bind-key -T root DoubleClick1Status confirm-before -p "kill-window #W? (y/n)" kill-window

# ============================================================
# Mouse Bindings for Pane Menu
# ============================================================
# ペイン上での右クリックメニュー
bind-key -T root MouseDown3Pane display-menu -x M -y M -T "Pane Menu" \
    "Paste from clipboard" p "run-shell 'LC_ALL=ja_JP.UTF-8 pbpaste | tmux load-buffer - && tmux paste-buffer -p'" \
    "-" "" "" \
    "Enter copy mode" c "copy-mode" \
    "Cancel" q ""

# Copy Mode中の右クリックメニュー
bind-key -T copy-mode-vi MouseDown3Pane display-menu -x M -y M -T "Copy Menu" \
    "Copy selection" y "send-keys -X copy-selection" \
    "Copy and cancel" Y "send-keys -X copy-selection-and-cancel" \
    "-" "" "" \
    "Cancel copy mode" q "send-keys -X cancel" \
    "Cancel" Escape "send-keys -X cancel"

# ============================================================
# Vi Mode Settings
# ============================================================
setw -g mode-keys vi
set-window-option -g mode-keys vi

# Vi selection
bind -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle


# ============================================================
# Plugins / External Settings
# ============================================================


# ============================================================
# OS-Specific Configuration
# ============================================================
# Load OS-specific configuration for clipboard integration
if-shell 'uname | grep -q Linux' 'source-file ~/.config/tmux/tmux.linux.conf'
if-shell 'uname | grep -q Darwin' 'source-file ~/.config/tmux/tmux.macos.conf'
