# ============================================================
# tmux macOS-specific Configuration
# ============================================================

# Clipboard integration using pbcopy/pbpaste
set-option -s copy-command "pbcopy"

# vi copy mode keybindings for macOS
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode C-c send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "pbcopy"

# Disable MouseDragEnd1Pane to prevent automatic selection copy
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
