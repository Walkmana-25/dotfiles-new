# ============================================================
# tmux Linux-specific Configuration
# ============================================================

# Clipboard integration (Wayland and X11)
# Detect display server and use appropriate clipboard command
if-shell 'waylandctl 2>/dev/null || [ -n "$WAYLAND_DISPLAY" ]' \
	'set-option -s copy-command "wl-copy"' \
	'set-option -s copy-command "xclip -selection clipboard"'

# Alternative: Use explicit if-shell checks for clipboard commands
# if-shell 'command -v wl-copy >/dev/null 2>&1' \
# 	'set-option -s copy-command "wl-copy"' \
# 	'if-shell "command -v xclip >/dev/null 2>&1" \
# 		"set-option -s copy-command \"xclip -selection clipboard\""'

# vi copy mode keybindings for Linux
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "$TMUX_COPY_CMD"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "$TMUX_COPY_CMD"
bind-key -T copy-mode C-c send-keys -X copy-pipe-and-cancel "$TMUX_COPY_CMD"
bind-key -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel "$TMUX_COPY_CMD"

# Disable MouseDragEnd1Pane to prevent automatic selection copy
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane

# update env display
set-option -g update-environment "DISPLAY WAYLAND_DISPLAY XAUTHORITY"



